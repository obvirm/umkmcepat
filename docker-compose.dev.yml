services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: umkmcepat-app-dev
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/umkmcepat?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next_cache:/app/.next
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  app_node_modules:
  app_next_cache:
